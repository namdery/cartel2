<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cartel Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1e1e2e; /* Глубокий темный со скриншота */
            --accent-blue: #4351ff; /* Синий цвет акцентов */
            --accent-orange: #ff6d2d; /* Оранжевый кнопок */
            --card-bg: #f4f7fb; /* Светло-серый фон плашек */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Шапка с лого */
        header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-btn {
            height: 32px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        /* Контент */
        .container {
            padding: 0 20px 30px 20px;
        }

        h1 {
            font-weight: 900;
            font-size: 32px;
            line-height: 1.1;
            margin: 10px 0 20px 0;
            letter-spacing: -1px;
        }

        .blue-span { color: var(--accent-blue); }

        .description {
            font-size: 15px;
            color: #6a6a77;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Карточки мероприятий (Синхронизация) */
        .event-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #eef0f5;
        }

        .event-card h3 {
            margin: 0 0 8px 0;
            font-size: 18px;
            font-weight: 700;
        }

        .event-date {
            color: var(--accent-blue);
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            display: block;
            margin-bottom: 10px;
        }

        .btn-orange {
            background: var(--accent-orange);
            color: white;
            text-align: center;
            padding: 18px;
            border-radius: 15px;
            font-weight: 700;
            text-decoration: none;
            display: block;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(255, 109, 45, 0.3);
        }
    </style>
</head>
<body>

    <header>
        <img src="image1.png" alt="Cartel" class="logo-btn" onclick="window.location.reload()">
    </header>

    <div class="container">
        <div id="main-view">
            <h1>Global club of <span class="blue-span">traders & investors.</span></h1>
            <p class="description">Актуальные события и инструменты для вашего финансового роста в одном приложении.</p>
            
            <div id="events-container">
                <p>Загрузка мероприятий...</p>
            </div>

            <a href="#" class="btn-orange" onclick="Telegram.WebApp.close()">Вернуться в бот</a>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#ffffff";

        // Функция синхронизации с ботом
        async function syncEvents() {
            const container = document.getElementById('events-container');
            try {
                // ЗАМЕНИТЕ НА URL ВАШЕГО СЕРВЕРА (где запущен бот)
                const response = await fetch('https://your-bot-server.com/api/events');
                const data = await response.json();

                if (data.events.length === 0) {
                    container.innerHTML = '<div class="event-card">Мероприятий пока нет</div>';
                    return;
                }

                container.innerHTML = ''; 
                data.events.forEach(ev => {
                    container.innerHTML += `
                        <div class="event-card">
                            <span class="event-date">${ev.date}</span>
                            <h3>${ev.name}</h3>
                            <div style="font-size: 14px; color: #555;">${ev.description}</div>
                        </div>
                    `;
                });
            } catch (err) {
                container.innerHTML = '<p style="color:red">Ошибка синхронизации с ботом</p>';
            }
        }

        // Запуск при открытии
        syncEvents();
    </script>
</body>
</html>
