<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartel Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #f4f7f9;
            --primary-blue: #1a237e;
            --accent-orange: #ff6d00;
            --text-dark: #212121;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Шапка с логотипом */
        header {
            width: 100%;
            padding: 15px 20px;
            background: var(--white);
            display: flex;
            align-items: center;
            box-sizing: border-box;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-btn {
            height: 40px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .logo-btn:active {
            transform: scale(0.95);
        }

        /* Контент */
        .container {
            padding: 20px;
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary-blue);
            line-height: 1.2;
            margin-bottom: 20px;
        }

        span.accent {
            color: var(--accent-orange);
        }

        .description {
            font-size: 14px;
            color: #555;
            line-height: 1.5;
            margin-bottom: 30px;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* Кнопки в стиле скриншота */
        .btn-group {
            display: grid;
            gap: 15px;
            width: 100%;
        }

        .main-btn {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .secondary-btn {
            background-color: var(--accent-orange);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .main-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <header>
        <img src="image1.png" alt="Logo" class="logo-btn" onclick="goHome()">
    </header>

    <div class="container" id="app-content">
        <div id="main-menu">
            <h1>Cartel — глобальная сеть <span class="accent">роста и успеха!</span></h1>
            
            <div class="description">
                Мы — сообщество трейдеров и инвесторов. Присоединяйтесь к 100,000+ участников по всему миру.
            </div>

            <div class="btn-group">
                <button class="main-btn" onclick="showEvents()">Ближайшие ивенты</button>
                <button class="secondary-btn" onclick="Telegram.WebApp.openLink('https://t.me/cartel_info')">Наш Telegram</button>
            </div>
        </div>

        <div id="events-page" style="display:none;">
            <h1>Доступные <span class="accent">мероприятия</span></h1>
            <div id="events-list"></div>
            <button class="main-btn" style="margin-top:20px; background:#666;" onclick="goHome()">Назад</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        function goHome() {
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('events-page').style.display = 'none';
        }

        function showEvents() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('events-page').style.display = 'block';
            // Тут можно сделать Fetch запрос к вашему API для получения events.json
        }

        // Настройка главной кнопки TG
        tg.MainButton.setText("ЗАКРЫТЬ ПРИЛОЖЕНИЕ");
        tg.MainButton.show();
        tg.MainButton.onClick(() => tg.close());
    </script>
</body>
</html>
