<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cartel Club</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7ff;
            --text-main: #1a1e2e;
            --accent-blue: #0015ff;
            --accent-orange: #ff6d2d;
            --frame-blue: #d1dbff;
            --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
        }

        header {
            position: fixed; top: 0; left: 0; right: 0;
            height: 70px; background: rgba(244, 247, 255, 0.9);
            backdrop-filter: blur(15px); display: flex;
            align-items: center; padding: 0 20px; z-index: 1000;
            border-bottom: 1px solid var(--frame-blue);
        }

        .logo-img { height: 33px; cursor: pointer; }

        .nav-menu { display: flex; gap: 8px; margin-left: auto; position: relative; }
        .nav-btn {
            background: #ffffff; border: 1px solid var(--frame-blue); 
            font-weight: 700; font-size: 13px; color: var(--text-main); 
            cursor: pointer; padding: 10px 16px; border-radius: 12px;
            display: flex; align-items: center; gap: 8px;
        }
        .arrow-svg { width: 12px; transition: 0.3s; fill: currentColor; }
        .nav-btn.active .arrow-svg { transform: rotate(180deg); }

        .articles-dropdown {
            position: absolute; top: 55px; right: 0;
            background: white; border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0, 21, 255, 0.1);
            width: 280px; opacity: 0; visibility: hidden;
            transform: translateY(-10px); transition: var(--transition);
            border: 1px solid var(--frame-blue); overflow: hidden;
        }
        .articles-dropdown.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .article-link { 
            display: block; padding: 14px 20px; text-decoration: none; 
            color: var(--text-main); font-size: 14px; font-weight: 600;
            border-bottom: 1px solid #f0f3ff;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 100px 20px 40px; }

        /* Иконки экспертов в столбик */
        .experts-list { display: flex; flex-direction: column; align-items: center; gap: 40px; margin-top: 50px; }
        .expert-card-main { text-align: center; cursor: pointer; width: 100%; }
        .expert-circle {
            width: 160px; height: 160px; border-radius: 50%;
            background: linear-gradient(135deg, #4351ff 0%, #ff6d2d 100%);
            padding: 5px; display: inline-flex; margin-bottom: 15px;
        }
        .expert-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: white; }
        .expert-name-label { font-weight: 900; font-size: 20px; color: #1a1e2e; }

        /* Стиль заголовков как на фото */
        .grad-title { font-size: 36px; font-weight: 900; line-height: 1.1; margin-bottom: 25px; }
        .grad-title span:first-child { color: #0015ff; }
        .grad-title .orange-part { 
            background: linear-gradient(90deg, #ff6d2d, #ffb32d);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Список достижений с галками */
        .achieve-item { display: flex; gap: 15px; margin-bottom: 20px; align-items: flex-start; }
        .check-circle {
            width: 24px; height: 24px; background: #0015ff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 3px;
        }
        .check-circle svg { width: 14px; height: 14px; fill: white; }

        .desc-text { font-size: 16px; color: #475569; line-height: 1.6; white-space: pre-line; margin-bottom: 20px; }
        .desc-text b, .desc-text strong { color: #1a1e2e; font-weight: 800; }

        .btn-back {
            width: 100%; padding: 16px; background: white; border: 1px solid var(--frame-blue);
            border-radius: 14px; font-weight: 700; color: #64748b; margin-top: 30px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        
        .hero-title { font-weight: 900; font-size: 30px; line-height: 1.15; margin-bottom: 20px; }
        .accent-grad {
            background: linear-gradient(90deg, #4351ff, #ff6d2d);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Для страницы мероприятия */
        .event-box { background: white; border: 2px solid var(--frame-blue); border-radius: 24px; padding: 24px; margin-bottom: 20px; }
    </style>
</head>

        function initExperts() {
            const container = document.getElementById('experts-container');
            expertsData.forEach((ex, idx) => {
                const div = document.createElement('div');
                div.className = 'expert-card-main';
                div.onclick = () => showExpertDetail(idx);
                div.innerHTML = `
                    <div class="expert-circle">
                        <img src="${ex.img}" onerror="this.src='https://via.placeholder.com/160'">
                    </div>
                    <div class="expert-name-label">${ex.name}</div>
                `;
                container.appendChild(div);
            });
        }

        function showExpertDetail(idx) {
            hideAll();
            const ex = expertsData[idx];
            const content = document.getElementById('expert-content');
            document.getElementById('expert-detail-view').style.display = 'block';
            window.scrollTo(0,0);

            let achievementsHtml = ex.achievements.map(a => `
                <div class="achieve-item">
                    <div class="check-circle">
                        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                    </div>
                    <div class="desc-text" style="margin:0">${a}</div>
                </div>
            `).join('');

            content.innerHTML = `
                <div style="text-align:center; margin-bottom:40px;">
                    <div class="expert-circle" style="width:220px; height:220px;">
                        <img src="${ex.img}">
                    </div>
                    <h1 class="expert-name-label" style="font-size:32px;">${ex.name}</h1>
                </div>

                <h2 class="grad-title"><span>Краткое</span> <span class="orange-part">представление</span></h2>
                <div class="desc-text">${ex.bio}</div>

                <h2 class="grad-title" style="margin-top:50px;"><span>Профессиональные</span> <span class="orange-part">достижения</span></h2>
                <div>${achievementsHtml}</div>
            `;
        }

            document.getElementById('events-list-view').style.display = 'block';
            const container = document.getElementById('events-container');
            container.innerHTML = '<div style="text-align:center; padding:40px;">Загрузка...</div>';
            try {
                const res = await fetch(`${API_URL}/api/events?user_id=${tg.initDataUnsafe?.user?.id || 0}`);
                const data = await res.json();
                container.innerHTML = '';
                data.events.forEach(ev => {
                    const div = document.createElement('div');
                    div.className = 'event-box';
                    div.innerHTML = `
                        <div style="color:var(--accent-blue); font-weight:800; font-size:13px; margin-bottom:8px;">${ev.date}</div>
                        <h3 style="font-weight:900; margin-bottom:10px;">${ev.name}</h3>
                        <div style="font-size:14px; color:#475569;">${ev.description}</div>
                    `;
                    container.appendChild(div);
                });
            } catch(e) { container.innerHTML = 'Мероприятий не найдено.'; }
        }

        function showArticle(id) {
            hideAll();
            document.getElementById('article-view').style.display = 'block';
            const target = document.getElementById('article-page-target');
            window.scrollTo(0,0);
            target.innerHTML = `<h1 class="grad-title"><span>Статья</span> <span class="orange-part">${id}</span></h1><div class="desc-text">Контент статьи загружается...</div>`;
        }

        function hideAll() {
            ['home-view','expert-detail-view','events-list-view','article-view'].forEach(id => document.getElementById(id).style.display = 'none');
            document.getElementById('articles-list').classList.remove('active');
            document.getElementById('art-btn').classList.remove('active');
        }

        function goHome() { hideAll(); document.getElementById('home-view').style.display = 'block'; window.scrollTo(0,0); }
        function toggleArticles() {
            document.getElementById('articles-list').classList.toggle('active');
            document.getElementById('art-btn').classList.toggle('active');
        }

        initExperts();
    </script>
</body>
</html>
