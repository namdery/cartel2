<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cartel Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1e1e2e;
            --accent-blue: #4351ff;
            --accent-orange: #ff6d2d;
            --card-bg: #f4f7fb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
        }

        header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-btn {
            height: 32px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .container {
            padding: 0 20px 30px 20px;
        }

        h1 {
            font-weight: 900;
            font-size: 32px;
            line-height: 1.1;
            margin: 10px 0 20px 0;
            letter-spacing: -1px;
        }

        .blue-span {
            color: var(--accent-blue);
        }

        .description {
            font-size: 15px;
            color: #6a6a77;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .event-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #eef0f5;
            transition: transform 0.2s;
        }

        .event-card:hover {
            transform: translateY(-2px);
        }

        .event-card h3 {
            margin: 0 0 8px 0;
            font-size: 18px;
            font-weight: 700;
        }

        .event-date {
            color: var(--accent-blue);
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 10px;
        }

        .event-desc {
            font-size: 14px;
            color: #555;
            margin: 10px 0;
            line-height: 1.4;
        }

        .btn-register {
            background: var(--accent-orange);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            width: 100%;
            cursor: pointer;
            margin-top: 15px;
            font-size: 14px;
            transition: opacity 0.2s;
        }

        .btn-register:active {
            opacity: 0.8;
        }

        .btn-register.disabled, .btn-register:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-orange {
            background: var(--accent-orange);
            color: white;
            text-align: center;
            padding: 18px;
            border-radius: 15px;
            font-weight: 700;
            text-decoration: none;
            display: block;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(255, 109, 45, 0.3);
            cursor: pointer;
            border: none;
            width: 100%;
            font-size: 16px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 350px;
        }

        .modal-content h3 {
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-submit {
            background: var(--accent-orange);
            color: white;
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #666;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>

    <header>
        <img src="image1.png" alt="Cartel" class="logo-btn" onclick="window.location.reload()">
    </header>

    <div class="container">
        <div id="main-view">
            <h1>Global club of <span class="blue-span">traders & investors.</span></h1>
            <p class="description">Актуальные события и инструменты для вашего финансового роста в одном приложении.</p>
            
            <div id="events-container">
                <div class="loading">🔄 Загрузка мероприятий...</div>
            </div>

            <button class="btn-orange" onclick="Telegram.WebApp.close()">Вернуться в бот</button>
        </div>
    </div>

    <!-- Модальное окно регистрации -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>📝 Регистрация на мероприятие</h3>
            <div class="input-group">
                <label>Ваше имя</label>
                <input type="text" id="user-name" placeholder="Введите ваше имя">
            </div>
            <div class="input-group">
                <label>Номер телефона</label>
                <input type="tel" id="user-phone" placeholder="+7 (XXX) XXX-XX-XX">
            </div>
            <div class="modal-buttons">
                <button class="btn-submit" onclick="submitRegistration()">Записаться</button>
                <button class="btn-cancel" onclick="closeModal()">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#ffffff";
        
        let currentEventId = null;
        let userData = tg.initDataUnsafe?.user;
        
        // ВАЖНО: ЗАМЕНИТЕ НА URL ВАШЕГО СЕРВЕРА С БОТОМ
        // Используйте ngrok URL или публичный IP
        const API_BASE_URL = "http://localhost:8080"; // ЗАМЕНИТЕ НА ВАШ URL
        
        async function loadEvents() {
            const container = document.getElementById('events-container');
            try {
                const response = await fetch(`${API_BASE_URL}/api/events`);
                const data = await response.json();
                
                if (!data.events || data.events.length === 0) {
                    container.innerHTML = '<div class="event-card">📭 Мероприятий пока нет</div>';
                    return;
                }
                
                container.innerHTML = '';
                
                for (const event of data.events) {
                    // Проверяем, зарегистрирован ли пользователь
                    let isRegistered = false;
                    if (userData) {
                        try {
                            const checkResponse = await fetch(`${API_BASE_URL}/api/check`, {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({
                                    user_id: userData.id,
                                    event_id: event.id
                                })
                            });
                            const checkResult = await checkResponse.json();
                            isRegistered = checkResult.registered;
                        } catch (err) {
                            console.error('Ошибка проверки регистрации:', err);
                        }
                    }
                    
                    const eventCard = document.createElement('div');
                    eventCard.className = 'event-card';
                    eventCard.innerHTML = `
                        <span class="event-date">📅 ${event.date}</span>
                        <h3>${event.name}</h3>
                        <div class="event-desc">${event.description}</div>
                        ${event.link ? `<a href="${event.link}" target="_blank" style="color: #4351ff; font-size: 13px; text-decoration: none;">🔗 Подробнее</a>` : ''}
                        <button class="btn-register" 
                                onclick="openRegistration(${event.id})"
                                ${isRegistered ? 'disabled' : ''}
                                style="${isRegistered ? 'background: #4caf50;' : ''}">
                            ${isRegistered ? '✓ Вы уже записаны' : '✍️ Записаться'}
                        </button>
                    `;
                    container.appendChild(eventCard);
                }
            } catch (error) {
                console.error('Ошибка загрузки мероприятий:', error);
                container.innerHTML = `<div class="event-card" style="color: red;">❌ Ошибка подключения к серверу. Убедитесь, что бот запущен.</div>`;
            }
        }
        
        function openRegistration(eventId) {
            if (!userData) {
                showMessage('❌ Пожалуйста, откройте приложение через Telegram бота');
                return;
            }
            currentEventId = eventId;
            document.getElementById('modal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('user-name').value = '';
            document.getElementById('user-phone').value = '';
            currentEventId = null;
        }
        
        async function submitRegistration() {
            const name = document.getElementById('user-name').value.trim();
            const phone = document.getElementById('user-phone').value.trim();
            
            if (!name) {
                showMessage('❌ Пожалуйста, введите ваше имя');
                return;
            }
            if (!phone) {
                showMessage('❌ Пожалуйста, введите номер телефона');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userData.id,
                        event_id: currentEventId,
                        name: name,
                        phone: phone
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('✅ ' + result.message);
                    closeModal();
                    loadEvents(); // Обновляем список
                    
                    // Отправляем уведомление в Telegram
                    tg.sendData(JSON.stringify({
                        action: 'registered',
                        event_id: currentEventId
                    }));
                } else {
                    showMessage('❌ ' + (result.error || 'Ошибка регистрации'));
                }
            } catch (error) {
                console.error('Ошибка регистрации:', error);
                showMessage('❌ Ошибка регистрации. Проверьте подключение к серверу.');
            }
        }
        
        function showMessage(text) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = text;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Загружаем мероприятия при открытии
        loadEvents();
        
        // Обновляем каждые 30 секунд
        setInterval(loadEvents, 30000);
    </script>
</body>
</html>
