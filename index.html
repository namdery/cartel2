<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cartel Club</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7ff;
            --text-main: #1a1e2e;
            --accent-blue: #4351ff;
            --frame-blue: #d1dbff;
            --accent-orange: #ff6d2d;
            --success-green: #10b981;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        header {
            position: fixed; top: 0; left: 0; right: 0;
            height: 70px; background: rgba(244, 247, 255, 0.9);
            backdrop-filter: blur(15px); display: flex;
            align-items: center; padding: 0 20px; z-index: 1000;
            border-bottom: 1px solid var(--frame-blue);
        }

        .logo-img { height: 33px; cursor: pointer; transition: 0.2s; }
        .logo-img:active { transform: scale(0.95); }

        .nav-menu { display: flex; gap: 8px; margin-left: auto; position: relative; }
        .nav-btn {
            background: #ffffff; border: 1px solid var(--frame-blue); 
            font-weight: 700; font-size: 13px; color: var(--text-main); 
            cursor: pointer; padding: 10px 16px; border-radius: 12px;
            transition: 0.2s;
        }

        .articles-dropdown {
            position: absolute; top: 50px; right: 0;
            background: white; border-radius: 18px;
            box-shadow: 0 15px 35px rgba(67, 81, 255, 0.15);
            width: 220px; opacity: 0; visibility: hidden;
            transform: translateY(-10px); transition: var(--transition);
            border: 1px solid var(--frame-blue); z-index: 1001;
        }
        .articles-dropdown.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .article-link { 
            display: block; padding: 14px 20px; text-decoration: none; 
            color: var(--text-main); font-size: 14px; font-weight: 600;
            border-bottom: 1px solid #f0f3ff; 
        }

        .container { max-width: 600px; margin: 0 auto; padding: 100px 20px 40px; }

        .reveal { opacity: 0; transform: translateY(25px); transition: var(--transition); margin-bottom: 45px; }
        .reveal.visible { opacity: 1; transform: translateY(0); }

        .hero-title { font-weight: 900; font-size: 30px; line-height: 1.15; letter-spacing: -1px; }
        .gradient-text {
            background: linear-gradient(90deg, #4351ff 0%, #a855f7 50%, #ff6d2d 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* КАРТОЧКИ БЕЗ КНОПОК И ФОТО */
        .event-card {
            background: #ffffff; border: 2px solid var(--frame-blue);
            border-radius: 24px; margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(67, 81, 255, 0.05);
            cursor: pointer; transition: 0.2s;
            padding: 24px;
        }
        .event-card:active { transform: scale(0.98); background: #f8faff; }

        .event-date-box { 
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--accent-blue); font-weight: 800; font-size: 13px; 
            text-transform: uppercase; margin-bottom: 10px;
        }

        .btn-main {
            width: 100%; padding: 18px; background: var(--accent-orange);
            color: white; border: none; border-radius: 16px;
            font-weight: 800; cursor: pointer; font-size: 16px;
            box-shadow: 0 6px 15px rgba(255, 109, 45, 0.2);
            transition: 0.2s;
        }
        
        /* Зеленая кнопка */
        .btn-main.registered {
            background: var(--success-green);
            box-shadow: 0 6px 15px rgba(16, 185, 129, 0.2);
        }

        .info-text-reg {
            margin-top: 15px;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: #475569;
            line-height: 1.4;
        }

        .event-link-block {
            margin: 20px 0 30px;
            padding: 15px;
            background: #eff6ff;
            border-radius: 12px;
            border: 1px dashed var(--accent-blue);
        }
        .event-link-block a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 700;
            word-break: break-all;
        }

        .btn-back {
            width: 100%; padding: 14px; background: #ffffff;
            color: #64748b; border: 1px solid var(--frame-blue); border-radius: 14px;
            font-weight: 700; cursor: pointer; margin-top: 12px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .social-row { display: flex; gap: 14px; margin-top: 25px; }
        .draw-icon {
            width: 52px; height: 52px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; border: 1px solid rgba(0,0,0,0.05);
        }
        .draw-yt { background: #ff0000; }
        .draw-tg { background: #24a1de; }
        .draw-ig { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(26, 30, 46, 0.8); z-index: 2000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 100%; max-width: 350px; padding: 30px; border-radius: 28px; border: 2px solid var(--frame-blue); }
        .modal input { width: 100%; padding: 16px; margin: 10px 0; border: 1px solid var(--frame-blue); border-radius: 14px; font-size: 16px; outline: none; background: #f8faff; }
    </style>
</head>
<body>

    <header>
        <img src="image1.png" class="logo-img" onclick="goHome()">
        <div class="nav-menu">
            <button class="nav-btn" onclick="toggleArticles()">Статьи</button>
            <button class="nav-btn" onclick="showEventsList()">Мероприятия</button>
            <div id="articles-list" class="articles-dropdown">
                <a href="https://statia1" class="article-link">Статья 1</a>
                <a href="https://statia2" class="article-link">Статья 2</a>
                <a href="https://statia3" class="article-link">Статья 3</a>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- ГЛАВНАЯ СТРАНИЦА -->
        <div id="home-view">
            <div class="reveal hero-title">
                Cartel — международный клуб трейдеров, инвесторов и предпринимателей, <span class="gradient-text">стремящихся к финансовому росту и успеху!</span>
            </div>
            <div class="reveal" style="font-size: 17px; color: #475569; line-height: 1.6;">
                Мы объединяем более 100 000 участников со всего мира.
            </div>

            <div class="reveal" style="border-top: 2px solid var(--frame-blue); padding-top: 35px;">
                <p style="font-size: 14px; font-weight: 600; color: #64748b; margin-bottom: 15px;">Наши соцсети:</p>
                <div class="social-row">
                    <a href="#" class="draw-icon draw-yt"><svg width="28" height="28" fill="white" viewBox="0 0 24 24"><path d="M23.5 6.2c-.3-1.1-1.1-1.9-2.2-2.2C19.3 3.5 12 3.5 12 3.5s-7.3 0-9.3.5c-1.1.3-1.9 1.1-2.2 2.2C0 8.2 0 12.3 0 12.3s0 4.1.5 6.1c.3 1.1 1.1 1.9 2.2 2.2 2 1 9.3 1 9.3 1s7.3 0 9.3-1c1.1-.3 1.9-1.1 2.2-2.2.5-2 .5-6.1.5-6.1s0-4.1-.5-6.1zM9.5 15.5V9l6.5 3.2-6.5 3.3z"/></svg></a>
                    <a href="#" class="draw-icon draw-tg"><svg width="26" height="26" fill="white" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm4.6 7.1l-1.6 7.4c-.1.5-.4.6-.8.4l-2.4-1.8-1.2 1.1c-.1.1-.2.2-.4.2l.2-2.5 4.5-4.1c.2-.2 0-.3-.3-.1L6.2 12.6l-2.4-.8c-.5-.2-.5-.5.1-.7l9.4-3.6c.4-.2.8.1.7.7z"/></svg></a>
                    <a href="#" class="draw-icon draw-ig"><svg width="26" height="26" fill="white" viewBox="0 0 24 24"><path d="M12 2.2c3.2 0 3.6 0 4.8.1 1.1.1 1.8.2 2.4.5.6.2 1.1.6 1.6 1.1.5.5.9 1 1.1 1.6.2.6.4 1.3.5 2.4.1 1.2.1 1.6.1 4.8s0 3.6-.1 4.8c-.1 1.1-.2 1.8-.5 2.4-.2.6-.6 1.1-1.1 1.6-.5.5-1 .9-1.6 1.1-.6.2-1.3.4-2.4.5-1.2.1-1.6.1-4.8.1s-3.6 0-4.8-.1c-1.1-.1-1.8-.2-2.4-.5-.6-.2-1.1-.6-1.6-1.1-.5-.5-.9-1-1.1-1.6-.2-.6-.4-1.3-.5-2.4-.1-1.2-.1-1.6-.1-4.8s0-3.6.1-4.8c.1-1.1.2-1.8.5-2.4.2-.6.6-1.1 1.1-1.6.5-.5 1-.9 1.6-1.1.6-.2 1.3-.4 2.4-.5 1.2-.1 1.6-.1 4.8-.1zM12 7c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0 8.2c-1.8 0-3.2-1.4-3.2-3.2s1.4-3.2 3.2-3.2 3.2 1.4 3.2 3.2-1.4 3.2-3.2 3.2zm5.2-9.3c.6 0 1.2.5 1.2 1.2s-.5 1.2-1.2 1.2-1.2-.5-1.2-1.2.5-1.2 1.2-1.2z"/></svg></a>
                </div>
            </div>
        </div>

        <!-- СПИСОК МЕРОПРИЯТИЙ -->
        <div id="events-list-view" style="display:none">
            <h2 style="margin-bottom: 30px; font-weight: 900; font-size: 28px;">Мероприятия</h2>
            <div id="events-container">Загрузка...</div>
        </div>

        <!-- ДЕТАЛИ МЕРОПРИЯТИЯ -->
        <div id="event-detail-view" style="display:none">
            <div id="detail-content"></div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 10px; font-weight: 900;">Регистрация</h3>
            <p style="font-size: 13px; color: #64748b; margin-bottom: 10px;">Заполни данные для записи</p>
            <input type="text" id="reg-name" placeholder="Твое имя">
            <input type="tel" id="reg-phone" placeholder="Номер телефона">
            <button class="btn-main" onclick="submitRegistration()">Записаться</button>
            <button class="btn-back" style="border:none" onclick="closeModal()">Отмена</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#f4f7ff";
        
        const API_URL = "http://localhost:8080"; 
        let allEvents = [];
        let currentActiveEventId = null;

        function hideAll() {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('events-list-view').style.display = 'none';
            document.getElementById('event-detail-view').style.display = 'none';
            document.getElementById('articles-list').classList.remove('active');
        }

        function goHome() {
            hideAll();
            document.getElementById('home-view').style.display = 'block';
        }

        async function showEventsList() {
            hideAll();
            document.getElementById('events-list-view').style.display = 'block';
            const container = document.getElementById('events-container');
            
            try {
                const userId = tg.initDataUnsafe?.user?.id || 0;
                const res = await fetch(`${API_URL}/api/events?user_id=${userId}`);
                const data = await res.json();
                allEvents = data.events;
                container.innerHTML = '';

                allEvents.forEach(ev => {
                    const card = document.createElement('div');
                    card.className = 'event-card';
                    card.onclick = () => showDetail(ev.id);
                    
                    card.innerHTML = `
                        <div class="event-date-box">${ev.date}</div>
                        <h3 style="font-weight:900; font-size:20px;">${ev.name}</h3>
                        <p style="margin-top:8px; color:#64748b; font-size:14px;">Нажми, чтобы узнать подробности и записаться →</p>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = 'Ошибка связи.';
            }
        }

        function showDetail(id) {
            hideAll();
            const ev = allEvents.find(x => x.id === id);
            currentActiveEventId = id;
            const content = document.getElementById('detail-content');
            document.getElementById('event-detail-view').style.display = 'block';
            
            let actionBtn = '';
            let infoText = '';
            
            if (ev.is_registered) {
                actionBtn = `<button class="btn-main registered">Вы уже записаны</button>`;
                infoText = `<div class="info-text-reg">Ждем вас ${ev.date} в 12:00 по адресу: г. Москва, ул. Трейдеров 1</div>`;
            } else {
                actionBtn = `<button class="btn-main" onclick="openModal()">Записаться на встречу</button>`;
            }

            content.innerHTML = `
                <div class="event-date-box">${ev.date}</div>
                <h2 style="font-weight:900; font-size:28px; margin-bottom:15px">${ev.name}</h2>
                <div style="line-height:1.7; color:#475569; font-size:16px;">${ev.description}</div>
                
                <div class="event-link-block">
                    <span style="display:block; font-size:12px; color:#64748b; margin-bottom:4px">Ссылка на мероприятие:</span>
                    <a href="${ev.link}" target="_blank">${ev.link}</a>
                </div>

                ${actionBtn}
                ${infoText}

                <button class="btn-back" style="margin-top:30px" onclick="showEventsList()">Назад к списку</button>
            `;
            window.scrollTo(0,0);
        }

        function toggleArticles() {
            document.getElementById('articles-list').classList.toggle('active');
        }

        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        async function submitRegistration() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            const user_id = tg.initDataUnsafe?.user?.id || 0;

            if(!name || !phone) { alert('Заполни все поля'); return; }

            try {
                const res = await fetch(`${API_URL}/api/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id, event_id: currentActiveEventId, name, phone })
                });
                const result = await res.json();
                if(result.success) {
                    tg.showAlert(result.message);
                    closeModal();
                    showEventsList(); // Обновляем данные
                } else {
                    tg.showAlert(result.error);
                }
            } catch (e) { alert('Ошибка сервера'); }
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
